<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - YouthRise</title>

```
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
```

</head>

<body>

<header>

```
<div class="logo">
    <div class="logo-box">YR</div>
    <div class="logo-text">YouthRise</div>
</div>
```

</header>

<section class="hero">

```
<h2>🔐 Login</h2>

<p>
    Access your YouthRise account.
</p>

<br>

<input type="email" id="loginEmail" placeholder="Email Address">

<br><br>

<input type="password" id="loginPassword" placeholder="Password">

<br><br>

<button onclick="loginUser()">Login</button>

<p id="loginMessage"></p>

<br>

<p>
    Don't have an account?
    <a href="signup.html">Create one here</a>
</p>
```

</section>

<footer>

```
<h3>YouthRise</h3>

<p>One Platform. Endless Opportunities.</p>

<p>© 2026 YouthRise. All Rights Reserved.</p>
```

</footer>

<script>

function loginUser(){

const email = document.getElementById("loginEmail").value;
const password = document.getElementById("loginPassword").value;

const savedEmail =
localStorage.getItem("youthrise_email");

const savedPassword =
localStorage.getItem("youthrise_password");

if(email === savedEmail &&
password === savedPassword){

localStorage.setItem(
"youthrise_logged_in",
"true"
);

document.getElementById("loginMessage").innerHTML =
"✅ Login successful!";

setTimeout(function(){

window.location.href =
"dashboard.html";

}, 1500);

}else{

document.getElementById("loginMessage").innerHTML =
"❌ Invalid email or password.";

}

}

</script>

</body>
</html>
